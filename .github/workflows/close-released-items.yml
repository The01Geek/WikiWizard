name: Close Released Project Items

# Manually triggered workflow that moves all issues and PRs
# with "Released" status to "Closed" in the GitHub Project.

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-released:
    name: Move Released items to Closed
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RADMAN_AI_APP_ID }}
          private-key: ${{ secrets.RADMAN_AI_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Move Released items to Closed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          ORG="${{ github.repository_owner }}"
          PROJECT_NUMBER="7"

          # Get project ID
          if ! PROJECT_RESPONSE=$(gh api graphql -f query='
            query {
              organization(login: "'$ORG'") {
                projectV2(number: '$PROJECT_NUMBER') {
                  id
                  title
                }
              }
            }' 2>&1); then
            echo "❌ Failed to query project"
            exit 1
          fi

          PROJECT_ID=$(echo "$PROJECT_RESPONSE" | jq -r '.data.organization.projectV2.id' 2>/dev/null)
          PROJECT_TITLE=$(echo "$PROJECT_RESPONSE" | jq -r '.data.organization.projectV2.title' 2>/dev/null)

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "❌ Project #$PROJECT_NUMBER not found in organization $ORG"
            exit 1
          fi

          echo "📋 Project: $PROJECT_TITLE"

          # Get Status field ID
          if ! FIELDS_RESPONSE=$(gh api graphql -f query='
            query {
              node(id: "'$PROJECT_ID'") {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }' 2>&1); then
            echo "❌ Failed to query project fields"
            exit 1
          fi

          FIELD_ID=$(echo "$FIELDS_RESPONSE" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id' 2>/dev/null)

          if [ -z "$FIELD_ID" ] || [ "$FIELD_ID" = "null" ]; then
            echo "❌ Status field not found in project"
            exit 1
          fi

          # Get option IDs for "Released" and "Closed"
          if ! OPTIONS_RESPONSE=$(gh api graphql -f query='
            query {
              node(id: "'$FIELD_ID'") {
                ... on ProjectV2SingleSelectField {
                  options {
                    id
                    name
                  }
                }
              }
            }' 2>&1); then
            echo "❌ Failed to query status options"
            exit 1
          fi

          RELEASED_OPTION_ID=$(echo "$OPTIONS_RESPONSE" | jq -r '.data.node.options[] | select(.name == "Released") | .id' 2>/dev/null)
          CLOSED_OPTION_ID=$(echo "$OPTIONS_RESPONSE" | jq -r '.data.node.options[] | select(.name == "Closed") | .id' 2>/dev/null)

          if [ -z "$RELEASED_OPTION_ID" ] || [ "$RELEASED_OPTION_ID" = "null" ]; then
            echo "❌ 'Released' status option not found"
            echo "   Available options:"
            echo "$OPTIONS_RESPONSE" | jq -r '.data.node.options[].name' 2>/dev/null | sed 's/^/   - /'
            exit 1
          fi

          if [ -z "$CLOSED_OPTION_ID" ] || [ "$CLOSED_OPTION_ID" = "null" ]; then
            echo "❌ 'Closed' status option not found"
            echo "   Available options:"
            echo "$OPTIONS_RESPONSE" | jq -r '.data.node.options[].name' 2>/dev/null | sed 's/^/   - /'
            exit 1
          fi

          echo "✅ Found status options: Released → Closed"

          # Collect all items with "Released" status (paginated)
          RELEASED_ITEMS=""
          CURSOR=""
          PAGE=1
          MAX_PAGES=20

          echo "🔍 Scanning project for items with 'Released' status..."

          while [ $PAGE -le $MAX_PAGES ]; do
            if [ -n "$CURSOR" ]; then
              QUERY='
                query {
                  node(id: "'$PROJECT_ID'") {
                    ... on ProjectV2 {
                      items(first: 100, after: "'$CURSOR'") {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              title
                              __typename
                            }
                            ... on PullRequest {
                              number
                              title
                              __typename
                            }
                          }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }'
            else
              QUERY='
                query {
                  node(id: "'$PROJECT_ID'") {
                    ... on ProjectV2 {
                      items(first: 100) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              title
                              __typename
                            }
                            ... on PullRequest {
                              number
                              title
                              __typename
                            }
                          }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }'
            fi

            if ! PROJECT_ITEM_RESPONSE=$(gh api graphql -f query="$QUERY" 2>&1); then
              echo "❌ Failed to query project items (page $PAGE)"
              exit 1
            fi

            # Find items with "Released" status
            PAGE_ITEMS=$(echo "$PROJECT_ITEM_RESPONSE" | jq -c '
              [.data.node.items.nodes[] |
                select(.fieldValues.nodes[] | select(.field.name == "Status" and .name == "Released")) |
                {id: .id, number: .content.number, title: .content.title, type: .content.__typename}
              ]' 2>/dev/null)

            PAGE_COUNT=$(echo "$PAGE_ITEMS" | jq 'length' 2>/dev/null)

            if [ "$PAGE_COUNT" -gt 0 ] 2>/dev/null; then
              if [ -z "$RELEASED_ITEMS" ]; then
                RELEASED_ITEMS="$PAGE_ITEMS"
              else
                RELEASED_ITEMS=$(echo "$RELEASED_ITEMS $PAGE_ITEMS" | jq -s 'add')
              fi
            fi

            HAS_NEXT_PAGE=$(echo "$PROJECT_ITEM_RESPONSE" | jq -r '.data.node.items.pageInfo.hasNextPage' 2>/dev/null)

            if [ "$HAS_NEXT_PAGE" != "true" ]; then
              break
            fi

            CURSOR=$(echo "$PROJECT_ITEM_RESPONSE" | jq -r '.data.node.items.pageInfo.endCursor' 2>/dev/null)
            PAGE=$((PAGE + 1))
          done

          if [ -z "$RELEASED_ITEMS" ] || [ "$RELEASED_ITEMS" = "[]" ]; then
            echo "ℹ️ No items found with 'Released' status."

            echo "## ℹ️ No Released Items Found" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No issues or pull requests with **Released** status were found in the project." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=$(echo "$RELEASED_ITEMS" | jq 'length')
          echo "📦 Found $TOTAL item(s) with 'Released' status"

          # Update each item to "Closed"
          while IFS= read -r item; do
            ITEM_ID=$(echo "$item" | jq -r '.id')
            ITEM_NUMBER=$(echo "$item" | jq -r '.number')
            ITEM_TITLE=$(echo "$item" | jq -r '.title')
            ITEM_TYPE=$(echo "$item" | jq -r '.type')

            echo "🔄 Moving $ITEM_TYPE #$ITEM_NUMBER to Closed: \"$ITEM_TITLE\"..."

            if ! UPDATE_RESPONSE=$(gh api graphql -f query='
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "'$PROJECT_ID'",
                  itemId: "'$ITEM_ID'",
                  fieldId: "'$FIELD_ID'",
                  value: { singleSelectOptionId: "'$CLOSED_OPTION_ID'" }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }' 2>&1); then
              echo "❌ Failed to update $ITEM_TYPE #$ITEM_NUMBER"
              continue
            fi

            UPDATED_ID=$(echo "$UPDATE_RESPONSE" | jq -r '.data.updateProjectV2ItemFieldValue.projectV2Item.id' 2>/dev/null)

            if [ -z "$UPDATED_ID" ] || [ "$UPDATED_ID" = "null" ]; then
              echo "❌ Update failed for $ITEM_TYPE #$ITEM_NUMBER"
              continue
            fi

            echo "✅ $ITEM_TYPE #$ITEM_NUMBER → Closed"
          done < <(echo "$RELEASED_ITEMS" | jq -c '.[]')

          echo ""
          echo "✅ Done! Processed $TOTAL Released item(s)."

          echo "## ✅ Released Items Moved to Closed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total items processed:** $TOTAL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | # | Title |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "$RELEASED_ITEMS" | jq -r '.[] | "| \(.type) | #\(.number) | \(.title) |"' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
